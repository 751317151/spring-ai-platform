server:
  port: 8082

spring:
  application:
    name: agent-service
  ai:
    openai:
#      api-key: ${OPENAI_API_KEY:sk-xxx}
#      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${aliQwen_api}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${LLM_MODEL:qwen3-vl-plus-2025-12-19}
          temperature: 0.7
          max-tokens: 4096
    chat:
      memory:
        repository:
          jdbc:
#            platform: mysql
            initialize-schema: always
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-platform
    username: ${DB_USER:postgres}
    password: ${DB_PASS:blackstar}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    org.springframework.ai: debug
    com.huah.ai.platform.agent: debug
