server:
  port: 8082

spring:
  application:
    name: agent-service
  ai:
    openai:
#      api-key: ${OPENAI_API_KEY:sk-xxx}
#      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${aliQwen_api}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${LLM_MODEL:qwen3-vl-plus-2025-12-19}
          temperature: 0.7
          max-tokens: 4096
          stream-usage: true
    mcp:
      client:
        enabled: true        # 设为 true 启用 MCP 助手
        name: agent-service-mcp
        version: 1.0.0
        type: SYNC
        request-timeout: 20s
        stdio:
          servers-configuration: classpath:mcp-servers.json
    chat:
      memory:
        repository:
          jdbc:
#            platform: mysql
            initialize-schema: always
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-platform
    username: ${DB_USER:postgres}
    password: ${DB_PASS:blackstar}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        ai.request.latency: true
      percentiles:
        ai.request.latency: 0.5, 0.95, 0.99

jwt:
  secret: ${JWT_SECRET:enterprise-ai-platform-secret-key-minimum-256-bits!!}
  expiration-ms: 86400000

logging:
  level:
    org.springframework.ai: debug
    com.huah.ai.platform.agent: debug

# --- Tool API 配置 ---
tools:
  search:
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: https://api.tavily.com
    google:
      api-key: ${GOOGLE_SEARCH_API_KEY:}
      cx: ${GOOGLE_SEARCH_CX:}
    summarize:
      timeout-ms: 15000
      max-content-length: 5000
  weather:
    qweather:
      api-key: ${QWEATHER_API_KEY:}
      base-url: ${QWEATHER_BASE_URL:https://devapi.qweather.com}
  data-analysis:
    query-timeout-seconds: 30
    max-rows: 1000
