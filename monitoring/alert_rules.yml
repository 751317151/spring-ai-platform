groups:
  - name: ai_platform_alerts
    rules:
      - alert: HighAiErrorRate
        expr: rate(ai_requests_errors_total[5m]) / rate(ai_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AI 请求错误率过高"
          description: "错误率 {{ $value | humanizePercentage }} 超过 5%，并持续 2 分钟"

      - alert: HighAiLatency
        expr: histogram_quantile(0.95, rate(ai_request_latency_seconds_bucket[5m])) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "AI 响应 P95 延迟过高"
          description: "P95 延迟 {{ $value }}s 超过 5 秒阈值"

      - alert: AiServiceDown
        expr: up{job=~".*-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI 服务实例宕机"
          description: "服务 {{ $labels.job }} 已离线超过 1 分钟"

      - alert: TokenLimitBreach
        expr: increase(ai_token_limit_exceeded_total[10m]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Token 配额超限频繁"
          description: "过去 10 分钟内 Token 超限 {{ $value }} 次"

      - alert: HighConcurrency
        expr: ai_requests_active > 50
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "AI 并发请求数过高"
          description: "当前并发 {{ $value }} 超过阈值 50"
