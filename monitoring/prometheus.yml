global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'gateway-service'
    static_configs:
      - targets: ['gateway-service:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'rag-service'
    static_configs:
      - targets: ['rag-service:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: 'agent-service'
    static_configs:
      - targets: ['agent-service:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'monitor-service'
    static_configs:
      - targets: ['monitor-service:8084']
    metrics_path: '/actuator/prometheus'
