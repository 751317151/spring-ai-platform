# ============================================================
# Enterprise AI Platform — Docker Compose
# ============================================================
# 使用前请先构建 Java 服务 JAR:
#   mvn clean package -DskipTests
#
# 启动:
#   docker-compose up -d
#
# 启动（含 GPU Ollama）:
#   docker-compose --profile gpu up -d
#
# 首次启动后拉取 Ollama 嵌入模型:
#   docker exec enterprise-ai-ollama ollama pull bge-m3
# ============================================================

services:
  # ======== 基础设施 ========

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-ai-postgres
    environment:
      POSTGRES_DB: ai-platform
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d ai-platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enterprise-ai-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: enterprise-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 初始化 MinIO bucket
  minio-init:
    image: minio/mc:latest
    container_name: enterprise-ai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/$${BUCKET_NAME};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      BUCKET_NAME: ${S3_BUCKET:-blackstar}

  # Ollama（CPU 模式，默认启动）
  ollama:
    image: ollama/ollama:latest
    container_name: enterprise-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Ollama GPU 模式（需 NVIDIA 驱动 + nvidia-docker2）
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: enterprise-ai-ollama-gpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

  # ======== 监控体系 ========

  prometheus:
    image: prom/prometheus:latest
    container_name: enterprise-ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:latest
    container_name: enterprise-ai-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

  # ======== 应用服务 ========

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: ../Dockerfile
    container_name: enterprise-ai-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai-platform
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-xxx}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-xxx}
      QWEN_API_KEY: ${QWEN_API_KEY:-sk-xxx}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-xxx}
      JWT_SECRET: ${JWT_SECRET:-enterprise-ai-platform-secret-key-minimum-256-bits!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rag-service:
    build:
      context: ./rag-service
      dockerfile: ../Dockerfile
    container_name: enterprise-ai-rag
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai-platform
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      ALI_QWEN_API_KEY: ${ALI_QWEN_API_KEY:-sk-xxx}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      LLM_MODEL: ${LLM_MODEL:-qwen3-vl-flash-2026-01-22}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-blackstar}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-enterprise-ai-platform-secret-key-minimum-256-bits!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-service:
    build:
      context: ./agent-service
      dockerfile: ../Dockerfile
    container_name: enterprise-ai-agent
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai-platform
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      ALI_QWEN_API_KEY: ${ALI_QWEN_API_KEY:-sk-xxx}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      LLM_MODEL: ${LLM_MODEL:-qwen3-vl-flash-2026-01-22}
      # Docker 容器内无 npx/node，禁用 MCP stdio 模式
      SPRING_AI_MCP_CLIENT_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:-enterprise-ai-platform-secret-key-minimum-256-bits!!}
      # Tool API Keys（可选，不配置则对应工具返回提示信息）
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY:-}
      GOOGLE_SEARCH_CX: ${GOOGLE_SEARCH_CX:-}
      QWEATHER_API_KEY: ${QWEATHER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile
    container_name: enterprise-ai-auth
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai-platform
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-enterprise-ai-platform-secret-key-minimum-256-bits!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  monitor-service:
    build:
      context: ./monitor-service
      dockerfile: ../Dockerfile
    container_name: enterprise-ai-monitor
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai-platform
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-enterprise-ai-platform-secret-key-minimum-256-bits!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ======== 前端 ========

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: enterprise-ai-web
    ports:
      - "80:80"
    depends_on:
      - gateway-service
      - rag-service
      - agent-service
      - auth-service
      - monitor-service

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
