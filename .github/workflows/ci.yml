name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        env:
          DB_USER: postgres
          DB_PASS: blackstar
          JWT_SECRET: enterprise-ai-platform-secret-key-minimum-256-bits!!
          S3_BUCKET: blackstar
          S3_ACCESS_KEY: CtqsQz02BLuHIt555PMjoM4d
          S3_SECRET_KEY: mltBO0bOnAXxXKvPCtFh4obvSrqavJz
          ALI_QWEN_API_KEY: test-key
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-images:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend jars
        env:
          DB_USER: postgres
          DB_PASS: blackstar
          JWT_SECRET: enterprise-ai-platform-secret-key-minimum-256-bits!!
          S3_BUCKET: blackstar
          S3_ACCESS_KEY: CtqsQz02BLuHIt555PMjoM4d
          S3_SECRET_KEY: mltBO0bOnAXxXKvPCtFh4obvSrqavJz
          ALI_QWEN_API_KEY: test-key
        run: mvn -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: docker compose build gateway-service rag-service agent-service auth-service monitor-service web
