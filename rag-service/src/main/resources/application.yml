server:
  port: 8081

spring:
  application:
    name: rag-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-platform
    username: ${DB_USER:postgres}
    password: ${DB_PASS:blackstar}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

  # Spring AI 配置
  ai:
    openai:
      api-key: ${aliQwen_api}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${LLM_MODEL:qwen3-vl-plus-2025-12-19}
          temperature: 0.7
          max-tokens: 4096
      embedding:
        options:
          model: qwen3-vl-embedding
    ollama:
      base-url: http://localhost:11434     # Ollama 服务地址
      embedding:
        options:
          model: bge-m3
    model:
      embedding: ollama
    # PGVector 向量库
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        schema-name: public
        table-name: document_embeddings
        initialize-schema: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
