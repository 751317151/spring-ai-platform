server:
  port: 8081

spring:
  application:
    name: rag-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-platform
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    dashscope:
      api-key: ${ALI_QWEN_API_KEY}
      chat:
        options:
          model: ${LLM_MODEL:qwen3-vl-plus-2025-12-19}
          temperature: 0.7
          max-tokens: 4096
      embedding:
        options:
          model: ${LLM_EMBEDDING_MODEL:qwen3-vl-embedding}
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        schema-name: public
        initialize-schema: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

storage:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    presigned-url-expiry: 3600

rag:
  retry:
    failed:
      enabled: ${RAG_RETRY_FAILED_ENABLED:false}
      batch-size: ${RAG_RETRY_FAILED_BATCH_SIZE:5}
      initial-delay-ms: ${RAG_RETRY_FAILED_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${RAG_RETRY_FAILED_FIXED_DELAY_MS:300000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    org.springframework.ai: debug
    com.huah.ai.platform.rag: debug
    org.springframework.jdbc: info

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
